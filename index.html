<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Brief</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06090d;
  --surface: #0b1017;
  --surface2: #10161e;
  --surface3: #151d27;
  --border: #1a2332;
  --border2: #243040;
  --text: #d8e2ec;
  --text2: #a0b0c0;
  --muted: #4a5e72;
  --dim: #263040;
  --green: #00e0a0;
  --green2: #00c890;
  --green-bg: rgba(0,224,160,0.06);
  --green-glow: rgba(0,224,160,0.25);
  --amber: #ffb020;
  --amber-bg: rgba(255,176,32,0.06);
  --red: #ff4060;
  --red-bg: rgba(255,64,96,0.06);
  --blue: #40a0ff;
  --blue-bg: rgba(64,160,255,0.06);
  --cyan: #00d4ff;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  height: 64px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.topbar-left { display: flex; align-items: center; gap: 1.25rem; }
.topbar-logo {
  font-family: var(--mono);
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.topbar-logo .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green-glow), 0 0 16px var(--green-glow);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}
.topbar-nav { display: flex; gap: 0; }
.topbar-nav a {
  font-family: var(--mono);
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--muted);
  padding: 0.35rem 0.75rem;
  border-radius: 4px;
  transition: all 0.2s;
}
.topbar-nav a.active { color: var(--text); background: var(--surface3); }
.topbar-nav a:hover:not(.active) { color: var(--text2); }
.topbar-right { display: flex; align-items: center; gap: 1rem; }
.topbar-date { font-family: var(--mono); font-size: 1.0rem; color: #ffffff; letter-spacing: 0.05em; }
.countdown-pill {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 0.2rem 0.65rem;
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  min-width: 110px;
  justify-content: center;
}
.countdown-pill.pre { color: var(--green); background: var(--green-bg); border: 1px solid rgba(0,224,160,0.15); }
.countdown-pill.open { color: var(--amber); background: var(--amber-bg); border: 1px solid rgba(255,176,32,0.15); }
.countdown-pill.closed { color: var(--muted); background: var(--surface2); border: 1px solid var(--border); }
.countdown-pill .cdot {
  width: 5px; height: 5px; border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}
.countdown-pill.pre .cdot { background: var(--green); box-shadow: 0 0 6px var(--green); }
.countdown-pill.open .cdot { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

/* ── INDICES STRIP ── */
.indices-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border: 2px solid var(--blue);
  box-shadow: 0 0 20px rgba(64,160,255,0.6), 0 0 40px rgba(64,160,255,0.3), inset 0 0 20px rgba(64,160,255,0.1);
  background: var(--surface);
  border-radius: 6px;
  margin: 8px;
  max-width: 50%;
}
.indices-strip .idx:nth-child(3) { border-right: none; }
.indices-strip .idx:nth-child(n+4) { border-top: 1px solid var(--border); }
.idx {
  padding: 0.5rem 0.6rem;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 1px;
  position: relative;
  overflow: hidden;
  animation: fadeIn 0.5s ease both;
}
.idx:last-child { border-right: none; }
.idx:nth-child(1) { animation-delay: 0s; }
.idx:nth-child(2) { animation-delay: 0.05s; }
.idx:nth-child(3) { animation-delay: 0.1s; }
.idx:nth-child(4) { animation-delay: 0.15s; }
.idx:nth-child(5) { animation-delay: 0.2s; }
.idx:nth-child(6) { animation-delay: 0.25s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.idx-top { display: flex; align-items: center; justify-content: space-between; }

/* ── TICKER NAME: bold, aqua, same size as value ── */
.idx-name {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--cyan);
}

.idx-spark { width: 24px; height: 10px; }
.idx-val { font-family: var(--mono); font-size: 0.9rem; font-weight: 600; color: var(--text); margin-top: 1px; line-height: 1.1; }
.idx-chg { font-family: var(--mono); font-size: 0.6rem; font-weight: 500; display: flex; align-items: center; gap: 2px; }
.idx-chg.up { color: var(--green); }
.idx-chg.down { color: var(--red); }
.idx-chg.flat { color: var(--muted); }
.idx-chg .arrow { font-size: 0.55rem; }

/* ── KEY LEVELS BAR ── */
.key-levels {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  overflow-x: auto;
}
.kl-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 1rem;
  border-right: 1px solid var(--border);
  white-space: nowrap;
  flex-shrink: 0;
}
.kl-item:last-child { border-right: none; }
.kl-tag {
  font-family: var(--mono);
  font-size: 0.52rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.1rem 0.35rem;
  border-radius: 2px;
  font-weight: 600;
}
.kl-tag.support { color: var(--green); background: var(--green-bg); }
.kl-tag.resist { color: var(--red); background: var(--red-bg); }
.kl-tag.pivot { color: var(--amber); background: var(--amber-bg); }
.kl-tag.event { color: var(--cyan); background: rgba(0,212,255,0.08); }
.kl-text { font-family: var(--mono); font-size: 0.68rem; color: var(--text2); }
.kl-val { font-family: var(--mono); font-size: 0.68rem; font-weight: 600; color: var(--text); }

/* ── FEAR & GREED ── */
.fg-strip {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.5rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.fg-label { font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }
.fg-track {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--red) 0%, var(--amber) 40%, var(--muted) 50%, var(--blue) 60%, var(--green) 100%);
  position: relative;
  opacity: 0.5;
}
.fg-needle {
  position: absolute;
  top: 50%;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: left 1s ease;
  border: 2px solid var(--bg);
}
.fg-score { font-family: var(--mono); font-size: 0.85rem; font-weight: 700; flex-shrink: 0; min-width: 28px; text-align: right; }
.fg-mood { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0; min-width: 80px; }

/* ── MAIN GRID ── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.25rem 1.5rem;
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 1.25rem;
}

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; animation: fadeIn 0.5s ease both; }
.card-head { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); background: var(--surface2); }
.card-title { font-family: var(--mono); font-size: 0.62rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); }
.badge { font-family: var(--mono); font-size: 0.52rem; font-weight: 600; letter-spacing: 0.06em; padding: 0.12rem 0.45rem; border-radius: 3px; }
.badge-green { color: var(--green); background: var(--green-bg); border: 1px solid rgba(0,224,160,0.12); }
.badge-blue { color: var(--blue); background: var(--blue-bg); border: 1px solid rgba(64,160,255,0.12); }
.badge-amber { color: var(--amber); background: var(--amber-bg); border: 1px solid rgba(255,176,32,0.12); }
.card-body { padding: 1rem; }

/* ── SECTOR HEATMAP ── */
.heatmap { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; padding: 0.75rem; }
.hm-cell { border-radius: 4px; padding: 0.55rem 0.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; text-align: center; min-height: 52px; transition: transform 0.15s; cursor: default; animation: fadeIn 0.4s ease both; }
.hm-cell:hover { transform: scale(1.04); z-index: 2; }
.hm-name { font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.85; }
.hm-val { font-family: var(--mono); font-size: 0.78rem; font-weight: 700; }

/* ── BRIEF CONTENT ── */
.brief { font-size: 0.85rem; line-height: 1.8; color: var(--text); }
.brief h2 { font-family: var(--mono); font-size: 0.7rem; font-weight: 600; color: var(--green); letter-spacing: 0.12em; text-transform: uppercase; margin: 1.5rem 0 0.6rem; padding-bottom: 0.35rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; }
.brief h2:first-child { margin-top: 0; }
.brief h2 .sec-icon { font-size: 0.65rem; }
.brief h3 { font-family: var(--mono); font-size: 0.65rem; font-weight: 500; color: var(--blue); letter-spacing: 0.08em; text-transform: uppercase; margin: 1rem 0 0.35rem; }
.brief p { margin-bottom: 0.7rem; }
.brief strong { font-weight: 600; color: var(--text); }
.brief em { color: var(--muted); }
.brief ul { margin: 0.5rem 0 0.75rem; display: flex; flex-direction: column; gap: 4px; list-style: none; }
.brief li { display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.82rem; line-height: 1.6; padding: 0.2rem 0; }
.brief li::before { content: '▸'; color: var(--green); font-family: var(--mono); font-size: 0.7rem; flex-shrink: 0; margin-top: 2px; }
.brief hr { border: none; border-top: 1px dashed var(--border); margin: 1.25rem 0; }
.callout { border-radius: 5px; padding: 0.65rem 0.85rem; margin: 0.75rem 0; font-size: 0.8rem; line-height: 1.6; border-left: 3px solid; }
.callout-green { background: var(--green-bg); border-color: var(--green2); color: var(--text2); }
.callout-amber { background: var(--amber-bg); border-color: var(--amber); color: var(--text2); }
.callout-red { background: var(--red-bg); border-color: var(--red); color: var(--text2); }
.callout-blue { background: var(--blue-bg); border-color: var(--blue); color: var(--text2); }
.callout-label { font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; margin-bottom: 0.25rem; }
.callout-green .callout-label { color: var(--green); }
.callout-amber .callout-label { color: var(--amber); }
.callout-red .callout-label { color: var(--red); }
.callout-blue .callout-label { color: var(--blue); }

/* ── NEWS ── */
.news-item { padding: 0.6rem 0; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; }
.news-item:last-child { border-bottom: none; }
.news-time { font-family: var(--mono); font-size: 0.52rem; color: var(--muted); letter-spacing: 0.05em; }
.news-text { font-size: 0.78rem; line-height: 1.5; color: var(--text); }
.news-tag { font-family: var(--mono); font-size: 0.48rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green); }

/* ── EARNINGS ── */
.earnings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px; }
.earn-cell { display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 0.6rem; background: var(--surface2); border-radius: 4px; }
.earn-ticker { font-family: var(--mono); font-size: 0.72rem; font-weight: 600; color: var(--text); min-width: 36px; }
.earn-info { font-family: var(--mono); font-size: 0.55rem; color: var(--muted); letter-spacing: 0.04em; }
.earn-when { font-family: var(--mono); font-size: 0.5rem; padding: 0.1rem 0.3rem; border-radius: 2px; margin-left: auto; flex-shrink: 0; }
.earn-bmo { color: var(--amber); background: var(--amber-bg); }
.earn-amc { color: var(--blue); background: var(--blue-bg); }

/* ── ECON CALENDAR ── */
.econ-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.45rem 0; border-bottom: 1px solid var(--border); }
.econ-item:last-child { border-bottom: none; }
.econ-time { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); min-width: 48px; }
.econ-name { font-size: 0.78rem; color: var(--text); flex: 1; }
.econ-impact { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.econ-impact.high { background: var(--red); box-shadow: 0 0 6px var(--red); }
.econ-impact.med { background: var(--amber); }
.econ-impact.low { background: var(--muted); }

/* ── LOADING ── */
.brief-loading { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); padding: 2.5rem 1rem; text-align: center; letter-spacing: 0.05em; }
.brief-loading::after { content: ''; animation: dots 1.5s steps(3) infinite; }
@keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
.brief-error { font-family: var(--mono); font-size: 0.72rem; color: var(--red); padding: 2rem; text-align: center; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .indices-strip { grid-template-columns: repeat(3, 1fr); }
  .main { grid-template-columns: 1fr; padding: 1rem; }
  .heatmap { grid-template-columns: repeat(3, 1fr); }
  .key-levels { overflow-x: auto; }
  .topbar { padding: 0 1rem; }
  .topbar-nav { display: none; }
}
@media (max-width: 600px) {
  .indices-strip { grid-template-columns: repeat(2, 1fr); }
  .heatmap { grid-template-columns: repeat(2, 1fr); }
  .earnings-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo"><span class="dot"></span> MORNING BRIEF</div>
    <nav class="topbar-nav">
      <a href="index.html" class="active">Brief</a>
      <a href="prep.html">Pre-Market Prep</a>
      <a href="#">Watchlist</a>
    </nav>
  </div>
  <div class="topbar-right">
    <div class="topbar-date" id="currentDate"></div>
    <div class="countdown-pill pre" id="countdown">
      <span class="cdot"></span>
      <span id="cdText">--:--:--</span>
    </div>
  </div>
</div>

<!-- INDICES STRIP -->
<div style="display:flex;justify-content:center;">
<div class="indices-strip" id="indicesStrip"></div>
</div>

<!-- KEY LEVELS BAR -->
<div class="key-levels" id="keyLevels"></div>

<!-- FEAR & GREED -->
<div class="fg-strip">
  <div class="fg-label">Fear & Greed</div>
  <div class="fg-track"><div class="fg-needle" id="fgNeedle" style="left:50%"></div></div>
  <div class="fg-score" id="fgScore">—</div>
  <div class="fg-mood" id="fgMood" style="color:var(--muted)">Loading...</div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <div style="display:flex; flex-direction:column; gap:1.25rem;">
    <div class="card" style="animation-delay:0.1s">
      <div class="card-head">
        <span class="card-title">Sector Heatmap</span>
        <span class="badge badge-green">Pre-Market</span>
      </div>
      <div class="heatmap" id="heatmap"></div>
    </div>
    <div class="card" style="animation-delay:0.2s">
      <div class="card-head">
        <span class="card-title">Today's Brief</span>
        <span class="badge badge-green" id="briefBadge">—</span>
      </div>
      <div class="card-body">
        <div class="brief" id="briefContent">
          <div class="brief-loading">Loading brief</div>
        </div>
      </div>
    </div>
  </div>

  <div style="display:flex; flex-direction:column; gap:1.25rem;">
    <div class="card" style="animation-delay:0.15s">
      <div class="card-head">
        <span class="card-title">Econ Calendar</span>
        <span class="badge badge-amber">Today</span>
      </div>
      <div class="card-body" id="econCal"></div>
    </div>
    <div class="card" style="animation-delay:0.2s">
      <div class="card-head">
        <span class="card-title">Earnings Today</span>
        <span class="badge badge-blue">Reports</span>
      </div>
      <div class="card-body">
        <div class="earnings-grid" id="earningsGrid"></div>
      </div>
    </div>
    <div class="card" style="animation-delay:0.25s">
      <div class="card-head">
        <span class="card-title">Latest Headlines</span>
        <span class="badge badge-green">Live</span>
      </div>
      <div class="card-body" id="newsList"></div>
    </div>
  </div>
</div>

<script>
// ── DATE & COUNTDOWN ─────────────────────────────────────
const now = new Date();
document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
document.getElementById('briefBadge').textContent = now.toISOString().split('T')[0];

function pad(n) { return String(n).padStart(2,'0'); }
function updateCountdown() {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', { timeZone:'America/New_York' }));
  const open = new Date(et); open.setHours(9,30,0,0);
  const close = new Date(et); close.setHours(16,0,0,0);
  const pill = document.getElementById('countdown');
  const txt = document.getElementById('cdText');
  const day = et.getDay();
  if (day===0||day===6) { txt.textContent='WEEKEND'; pill.className='countdown-pill closed'; return; }
  if (et>=open&&et<=close) { const d=close-et; const h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000); txt.textContent=`OPEN  ${pad(h)}:${pad(m)}:${pad(s)}`; pill.className='countdown-pill open'; return; }
  if (et>close) { txt.textContent='CLOSED'; pill.className='countdown-pill closed'; return; }
  const d=open-et; const h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
  txt.textContent=`OPENS ${pad(h)}:${pad(m)}:${pad(s)}`; pill.className='countdown-pill pre';
}
updateCountdown();
setInterval(updateCountdown, 1000);

// ── SPARK ─────────────────────────────────────────────────
function sparkSVG(color, seed) {
  const pts = []; let y = 9, r = seed;
  for (let i=0;i<20;i++) { r=(r*9301+49297)%233280; y+=((r/233280)-0.48)*5; y=Math.max(2,Math.min(16,y)); pts.push(`${i*(48/19)},${y}`); }
  const c = color || 'var(--green)';
  return `<svg viewBox="0 0 48 18" class="idx-spark" xmlns="http://www.w3.org/2000/svg"><polyline points="${pts.join(' ')}" fill="none" stroke="${c}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

// ── HELPERS ───────────────────────────────────────────────
function fmtNum(n, dec=2) { return isNaN(n) ? '—' : Number(n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function fmtPct(n) { if(isNaN(n)) return '—'; const s=n>=0?'+':''; return `${s}${Number(n).toFixed(2)}%`; }
function timeAgo(ts) { const d=Math.floor((Date.now()-ts*1000)/60000); if(d<1)return 'just now'; if(d<60)return `${d}m ago`; if(d<1440)return `${Math.floor(d/60)}h ago`; return `${Math.floor(d/1440)}d ago`; }

// ── YAHOO FINANCE FETCH ───────────────────────────────────
async function fetchQuote(sym) {
  try {
    const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`);
    const d = await r.json();
    const m = d?.chart?.result?.[0]?.meta;
    if (!m) return null;
    const prev = m.chartPreviousClose || m.previousClose || m.regularMarketPreviousClose;
    const price = m.regularMarketPrice;
    const chg = price - prev;
    const chgPct = prev ? (chg/prev)*100 : 0;
    return { price, prev, chg, chgPct };
  } catch(e) { return null; }
}

// ── LIVE FEAR & GREED (computed from VIX) ────────────────
function renderFearGreed(vix) {
  let score, label;
  if (vix < 12) { score=Math.round(90+(12-vix)*1.5); label='Extreme Greed'; }
  else if (vix < 18) { score=Math.round(75-(vix-12)*3); label='Greed'; }
  else if (vix < 23) { score=Math.round(55-(vix-18)*2); label='Neutral'; }
  else if (vix < 30) { score=Math.round(40-(vix-23)*2); label='Fear'; }
  else { score=Math.max(5,Math.round(26-(vix-30)*1.5)); label='Extreme Fear'; }
  score = Math.min(99,Math.max(1,score));
  const fgColor = score<25?'var(--red)':score<45?'var(--amber)':score<55?'var(--muted)':score<75?'var(--blue)':'var(--green)';
  const fgNeedle = document.getElementById('fgNeedle');
  setTimeout(()=>{ fgNeedle.style.left=score+'%'; fgNeedle.style.background=fgColor; fgNeedle.style.boxShadow=`0 0 8px ${fgColor}`; },100);
  document.getElementById('fgScore').textContent=score; document.getElementById('fgScore').style.color=fgColor;
  document.getElementById('fgMood').textContent=label; document.getElementById('fgMood').style.color=fgColor;
}

let sectorResults = [];
let activeSectorDrawer = null;

async function loadSectors() {
  const etfs = Object.entries(SECTOR_DATA).map(([name, d]) => ({ name, etf: d.etf }));
  const results = [];
  for (const s of etfs) {
    const q = await fetchQuote(s.etf);
    if (q) results.push({ name:s.name, etf:s.etf, chgPct:q.chgPct });
  }
  results.sort((a,b) => b.chgPct - a.chgPct);
  sectorResults = results;
  renderHeatmap(results);
}

function renderHeatmap(sectors) {
  document.getElementById('heatmap').innerHTML = sectors.map((s,i)=>{
    const intensity = Math.min(Math.abs(s.chgPct)/2, 1);
    let bg, txt;
    if (s.chgPct>0){bg=`rgba(0,224,160,${0.06+intensity*0.18})`;txt=`rgba(0,224,160,${0.6+intensity*0.4})`;}
    else{bg=`rgba(255,64,96,${0.06+intensity*0.18})`;txt=`rgba(255,64,96,${0.6+intensity*0.4})`;}
    const sign=s.chgPct>0?'+':'';
    return `<div class="hm-cell" style="background:${bg};animation-delay:${0.1+i*0.03}s;cursor:pointer;" onclick="openSectorDrawer('${s.name}')" title="Click for top 20">
      <div class="hm-name" style="color:${txt}">${s.name}</div>
      <div class="hm-val" style="color:${txt}">${sign}${s.chgPct.toFixed(2)}%</div>
    </div>`;
  }).join('');
}

// SECTOR DRAWER — top 20 tickers
async function openSectorDrawer(sectorName) {
  if (activeSectorDrawer === sectorName) { closeSectorDrawer(); return; }
  activeSectorDrawer = sectorName;
  const drawer = document.getElementById('sectorDrawer');
  const title = document.getElementById('drawerTitle');
  const list = document.getElementById('drawerList');
  if (!drawer) return;
  title.textContent = `${sectorName} — Top 20`;
  list.innerHTML = '<div style="padding:12px;color:var(--muted);font-family:var(--mono);font-size:0.7rem">Loading...</div>';
  drawer.style.display = 'block';
  const tickers = SECTOR_DATA[sectorName]?.tickers || [];
  const rows = [];
  for (const t of tickers) {
    const q = await fetchQuote(t);
    rows.push({ ticker:t, price: q?.price ?? null, chgPct: q?.chgPct ?? null });
  }
  rows.sort((a,b) => (b.chgPct??-99) - (a.chgPct??-99));
  list.innerHTML = rows.map((r,i) => {
    const cls = r.chgPct > 0 ? 'up' : r.chgPct < 0 ? 'down' : 'flat';
    const sign = r.chgPct > 0 ? '+' : '';
    const pctStr = r.chgPct !== null ? `${sign}${r.chgPct.toFixed(2)}%` : '—';
    const priceStr = r.price !== null ? `$${fmtNum(r.price)}` : '—';
    const rowBg = r.chgPct > 0 ? `rgba(0,224,160,${Math.min(Math.abs(r.chgPct)/3*0.12,0.12)})` : r.chgPct < 0 ? `rgba(255,64,96,${Math.min(Math.abs(r.chgPct)/3*0.12,0.12)})` : 'transparent';
    const txtColor = r.chgPct > 0 ? 'var(--green)' : r.chgPct < 0 ? 'var(--red)' : 'var(--muted)';
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);background:${rowBg}">
      <span style="font-family:var(--mono);font-size:0.62rem;color:var(--muted);width:16px;text-align:right">${i+1}</span>
      <span style="font-family:var(--mono);font-weight:600;font-size:0.78rem;width:52px;color:var(--cyan)">${r.ticker}</span>
      <span style="font-family:var(--mono);font-size:0.75rem;flex:1;color:var(--text)">${priceStr}</span>
      <span style="font-family:var(--mono);font-size:0.75rem;font-weight:600;color:${txtColor}">${pctStr}</span>
    </div>`;
  }).join('');
}

function closeSectorDrawer() {

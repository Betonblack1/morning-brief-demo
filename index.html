<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Brief</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #00d4ff;
        }
        .subtitle { color: #888; margin-bottom: 2rem; }
        .date-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .date-btn {
            background: #16213e;
            border: 1px solid #0f3460;
            color: #00d4ff;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .date-btn:hover { background: #0f3460; }
        .date-btn.active { background: #00d4ff; color: #1a1a2e; }
        .brief-content {
            background: #16213e;
            border-radius: 8px;
            padding: 2rem;
            border: 1px solid #0f3460;
        }
        .brief-content h2 { color: #00d4ff; margin: 1.5rem 0 0.5rem; }
        .brief-content h2:first-child { margin-top: 0; }
        .brief-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .brief-content th, .brief-content td {
            padding: 0.5rem;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }
        .brief-content th { color: #00d4ff; }
        .brief-content ul { margin-left: 1.5rem; }
        .brief-content li { margin: 0.25rem 0; }
        .brief-content hr { border: none; border-top: 1px solid #0f3460; margin: 1.5rem 0; }
        .loading { text-align: center; padding: 2rem; color: #888; }
        .error { color: #ff6b6b; text-align: center; padding: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Morning Brief</h1>
        <p class="subtitle">Daily market scan for traders</p>
        
        <div class="date-nav" id="dateNav"></div>
        
        <div class="brief-content" id="briefContent">
            <p class="loading">Loading...</p>
        </div>
    </div>

    <script>
        const briefsPath = 'briefs/';
        
        // Generate last 30 dates
        function getDates() {
            const dates = [];
            for (let i = 0; i < 30; i++) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                dates.push(d.toISOString().split('T')[0]);
            }
            return dates;
        }
        
        async function loadBrief(date) {
            const content = document.getElementById('briefContent');
            content.innerHTML = '<p class="loading">Loading...</p>';
            
            try {
                const response = await fetch(`${briefsPath}${date}-brief.md`);
                if (!response.ok) throw new Error('Brief not found');
                const text = await response.text();
                
                // Convert markdown to HTML (basic)
                let html = text
                    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.+?)\*/g, '<em>$1</em>')
                    .replace(/^- \[ \] (.+)$/gm, '<li>[ ] $1</li>')
                    .replace(/^- \[x\] (.+)$/gm, '<li>[✓] $1</li>')
                    .replace(/^- (.+)$/gm, '<li>$1</li>')
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/\|/g, '');
                
                content.innerHTML = `<p>${html}</p>`;
            } catch (e) {
                content.innerHTML = `<p class="error">No brief found for ${date}</p>`;
            }
        }
        
        function renderDateNav(dates, selected) {
            const nav = document.getElementById('dateNav');
            nav.innerHTML = dates.map(d => 
                `<button class="date-btn ${d === selected ? 'active' : ''}" onclick="loadBrief('${d}')">${d}</button>`
            ).join('');
        }
        
        // Initialize
        const dates = getDates();
        const today = dates[0];
        renderDateNav(dates, today);
        loadBrief(today);
    </script>
</body>
</html>
